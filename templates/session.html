<!DOCTYPE html>
<html>
<head>
    <title>Exam Session</title>
</head>
<body>

<h2>Exam Session Management</h2>

<form action="/start_exam" method="POST">
    <input type="submit" value="Start Exam">
</form>

<br>

<form action="/pause_exam" method="POST">
    <input type="submit" value="Pause Exam">
</form>

<br>

<form action="/resume_exam" method="POST">
    <input type="submit" value="Resume Exam">
</form>

<br>

<form action="/end_exam" method="POST">
    <input type="submit" value="End Exam">
</form>

</body>
</html>
